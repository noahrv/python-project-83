{% extends "base.html" %}

{% block content %}
<div class="container-lg mt-3">
  <div class="bg-light p-5 rounded-3">
    <h1 class="display-3">Анализатор страниц</h1>
    <p class="lead">
      Бесплатно проверяйте сайты на SEO-пригодность
    </p>
    <form action="{{ url_for('create_url') }}" method="post" class="row g-3">
      <div class="col-12 col-md-8">
        <input
          type="url"
          name="url"
          value="{{ url }}"
          class="form-control form-control-lg {% if errors.url %}is-invalid{% endif %}"
          placeholder="https://www.example.com"
        >
        {% if errors.url %}
          <div class="invalid-feedback">
            {{ errors.url }}
          </div>
        {% endif %}
      </div>
      <div class="col-12 col-md-4">
        <button type="submit" class="btn btn-primary btn-lg px-5 text-uppercase">
          Проверить
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
